[variables]
NODE_ENV = "production"

[phases.setup]
# Node provider. Keep this in sync with your Coolify Node setting.
nixPkgs = ["nodejs_22"]

[phases.install]
# Monorepo: package-lock.json lives at repo root. Set Coolify/Nixpacks root to the
# repository (not only frontend/), or use a Dockerfile. From repo root: npm ci && npm run build --workspace=frontend
cmds = ["npm ci"]
["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
