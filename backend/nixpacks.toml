[variables]
# Prisma v7 requires Node >=20.19 or >=22.12.
# Coolify/Nixpacks env overrides were not consistently applied, so we pin setup explicitly here.
NIXPACKS_NODE_VERSION = "20.19.0"

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm-9_x", "openssl"]
aptPkgs = ["curl", "wget"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "pnpm run start:prod"
